name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on new push to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Quality gates (no app server needed) ─────────────────────────────────
  quality:
    name: TypeScript + Lint + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint (0 errors gate)
        run: npm run lint:errors

      - name: Production build
        run: npm run build
        env:
          # Dummy values — build only checks bundling/TS, not runtime
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key

      # AFIP-S3A: prueba criptográfica en el MISMO runtime que las Edge Functions.
      # Deno resuelve npm:node-forge por su cuenta (--node-modules-dir=auto), así
      # que no toca package.json ni package-lock.json.
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno crypto test (AFIP key/cert correspondence + PKCS7 signing)
        run: npm run test:deno

  # ── E2E smoke tests ───────────────────────────────────────────────────────
  # Runs only on push to main (PRs don't have access to repo secrets)
  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: quality
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.E2E_ENABLED != 'false'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:e2e:smoke
        env:
          CI: 'true'
          E2E_BASE_URL: http://localhost:5173
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload Playwright report (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
