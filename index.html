    <!-- Structured Data (JSON-LD) — SoftwareApplication + planes reales.
         IMPORTANTE: lowPrice/highPrice/offerCount derivan de PLANS (src/types/subscription.ts).
         Si cambian los precios, actualizar acá. El test tests/unit/landing-structured-data.test.ts
         falla si este bloque se desincroniza de PLANS o si reaparece un aggregateRating. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "TechRepair Pro",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Sistema de gestión para talleres y locales de reparación de celulares. Órdenes de servicio, inventario, facturación ARCA, caja, clientes y finanzas conectadas.",
      "url": "https://techrepairpro.app",
      "offers": {
        "@type": "AggregateOffer",
        "priceCurrency": "ARS",
        "lowPrice": "15000",
        "highPrice": "45000",
        "offerCount": "3",
        "priceSpecification": {
          "@type": "UnitPriceSpecification",
          "priceCurrency": "ARS",
          "billingDuration": "P1M"
        }
      }
    }
    </script>

    <!-- Structured Data (JSON-LD) — Preguntas frecuentes -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Puedo probar TechRepair Pro gratis?",
          "acceptedAnswer": { "@type": "Answer", "text": "Sí. Tenés 14 días de prueba con las funciones del plan Pro, sin tarjeta de crédito." }
        },
        {
          "@type": "Question",
          "name": "¿Necesito instalar algo?",
          "acceptedAnswer": { "@type": "Answer", "text": "No. Funciona en el navegador desde computadora, tablet y celular. No instalás programas ni servidores." }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto cuesta empezar?",
          "acceptedAnswer": { "@type": "Answer", "text": "Empezás con 14 días gratis. Después, los planes arrancan en $15.000 por mes (Básico), con opción mensual o anual con descuento." }
        },
        {
          "@type": "Question",
          "name": "¿Cómo funciona la facturación ARCA?",
          "acceptedAnswer": { "@type": "Answer", "text": "Desde el plan Pro podés emitir facturas y notas de crédito con CAE. Requiere configurar los certificados fiscales del negocio." }
        },
        {
          "@type": "Question",
          "name": "¿Sirve para varias sucursales?",
          "acceptedAnswer": { "@type": "Answer", "text": "Sí. El plan Full incluye multisucursal con stock, caja y métricas por local, y permisos por usuario." }
        }
      ]
    }
    </script>
