<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/cat-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>TechRepair Pro — Sistema de gestión para talleres y locales de celulares</title>
    <meta name="description" content="Software para servicio técnico y reparación de celulares. Gestioná órdenes, inventario, caja, facturación ARCA y clientes desde cualquier dispositivo. Probalo gratis 14 días." />
    <meta name="keywords" content="sistema para servicio técnico, software para reparación de celulares, gestión para talleres técnicos, ARCA para service, inventario para técnicos, facturación electrónica taller, sistema gestión celulares Argentina, software taller reparaciones" />
    <meta name="author" content="TechRepair Pro" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://techrepairpro.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://techrepairpro.app/" />
    <meta property="og:title"       content="TechRepair Pro — Sistema para talleres de celulares" />
    <meta property="og:description" content="Gestioná órdenes, inventario, facturación ARCA y caja desde cualquier dispositivo. 14 días gratis, sin tarjeta." />
    <meta property="og:image"       content="https://techrepairpro.app/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="es_AR" />
    <meta property="og:site_name"   content="TechRepair Pro" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:url"         content="https://techrepairpro.app/" />
    <meta name="twitter:title"       content="TechRepair Pro — Sistema para talleres de celulares" />
    <meta name="twitter:description" content="Gestioná órdenes, inventario, facturación ARCA y caja desde cualquier dispositivo. 14 días gratis, sin tarjeta." />
    <meta name="twitter:image"       content="https://techrepairpro.app/og-image.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "TechRepair Pro",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Sistema de gestión para talleres y locales de reparación de celulares. Órdenes de servicio, inventario, facturación ARCA, caja y más.",
      "url": "https://techrepairpro.app",
      "offers": {
        "@type": "Offer",
        "price": "15000",
        "priceCurrency": "ARS",
        "priceSpecification": {
          "@type": "UnitPriceSpecification",
          "billingDuration": "P1M"
        }
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "1"
      }
    }
    </script>

    <!-- PWA — Mi Guita -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mi Guita" />
    <meta name="theme-color" content="#34d399" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#071018" />
    <!-- Prevent zoom on inputs in iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
