<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1f2d"/>
      <stop offset="100%" stop-color="#071018"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="166" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.2)" stroke-width="4"/>
  <!-- Inner circle -->
  <circle cx="256" cy="256" r="118" fill="rgba(52,211,153,0.12)" stroke="rgba(52,211,153,0.35)" stroke-width="5"/>
  <!-- $ sign -->
  <text x="256" y="325" text-anchor="middle" fill="url(#green)" font-size="188" font-weight="900" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', monospace" letter-spacing="-4">$</text>
  <!-- Vertical bars of $ -->
  <rect x="248" y="138" width="16" height="32" rx="8" fill="url(#green)" opacity="0.9"/>
  <rect x="248" y="342" width="16" height="32" rx="8" fill="url(#green)" opacity="0.9"/>
</svg>
