<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1f2d"/>
      <stop offset="100%" stop-color="#071018"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="44" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="96" cy="96" r="62" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.2)" stroke-width="1.5"/>
  <!-- Inner circle (coin) -->
  <circle cx="96" cy="96" r="44" fill="rgba(52,211,153,0.12)" stroke="rgba(52,211,153,0.35)" stroke-width="2"/>
  <!-- $ sign -->
  <text x="96" y="120" text-anchor="middle" fill="url(#green)" font-size="70" font-weight="900" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', monospace" letter-spacing="-2">$</text>
  <!-- Vertical bar of $ -->
  <rect x="93" y="52" width="6" height="12" rx="3" fill="url(#green)" opacity="0.9"/>
  <rect x="93" y="128" width="6" height="12" rx="3" fill="url(#green)" opacity="0.9"/>
</svg>
